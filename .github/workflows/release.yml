name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - run: dotnet publish killonparentexit/killonparentexit.csproj -c Release -r ${{ matrix.rid }}

      - uses: actions/upload-artifact@v4
        with:
          name: killonparentexit-${{ matrix.rid }}
          path: killonparentexit/bin/Release/net11.0/${{ matrix.rid }}/publish/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: killonparentexit-linux-x64
          path: linux-x64

      - uses: actions/download-artifact@v4
        with:
          name: killonparentexit-win-x64
          path: win-x64

      - run: |
          mv linux-x64/killonparentexit killonparentexit-linux-x64
          mv win-x64/killonparentexit.exe killonparentexit-win-x64.exe

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            killonparentexit-linux-x64
            killonparentexit-win-x64.exe
